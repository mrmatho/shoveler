name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            archive_name: Shoveler-windows-x64.zip
            archive_cmd: |
              Compress-Archive -Path dist/Shoveler/* -DestinationPath dist/Shoveler-windows-x64.zip
          - label: macOS
            os: macos-latest
            archive_name: Shoveler-macos-universal.zip
            archive_cmd: |
              cd dist
              zip -r Shoveler-macos-universal.zip Shoveler
          - label: Linux
            os: ubuntu-22.04
            archive_name: Shoveler-linux-x64.tar.gz
            archive_cmd: |
              cd dist
              tar -czf Shoveler-linux-x64.tar.gz Shoveler

    env:
      UV_PYTHON: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Linux GUI runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libegl1

      - name: Sync dependencies
        run: uv sync --python 3.12

      - name: Build app (PyInstaller)
        run: uv run --python 3.12 pyinstaller shoveler.spec --noconfirm --clean

      - name: Verify bundled theme assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $expectedSuffixes = @(
            "shoveler/assets/themes/light.qss",
            "shoveler/assets/themes/dark.qss",
            "shoveler/assets/themes/vivid.qss"
          )

          $packagedFiles = Get-ChildItem -Path "dist/Shoveler" -Recurse -File |
            ForEach-Object { $_.FullName.Replace("\", "/") }

          foreach ($suffix in $expectedSuffixes) {
            $matches = $packagedFiles | Where-Object { $_ -like "*/$suffix" }
            if (-not $matches) {
              throw "Missing packaged theme file ending with: $suffix"
            }
          }

      - name: Archive desktop bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.archive_cmd }}

      - name: Archive desktop bundle (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.archive_cmd }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}

  publish-release:
    name: Attach artifacts to GitHub Release
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
