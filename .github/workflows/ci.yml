name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      UV_PYTHON: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Linux GUI runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install --yes libegl1

      - name: Sync dependencies
        run: uv sync --python 3.12

      - name: Run tests
        run: uv run --python 3.12 pytest

  package-smoke:
    runs-on: windows-latest
    env:
      UV_PYTHON: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --python 3.12

      - name: Build app (PyInstaller)
        run: uv run --python 3.12 pyinstaller shoveler.spec --noconfirm --clean

      - name: Verify bundled theme assets
        shell: pwsh
        run: |
          $expectedSuffixes = @(
            "shoveler/assets/themes/light.qss",
            "shoveler/assets/themes/dark.qss",
            "shoveler/assets/themes/vivid.qss"
          )

          $packagedFiles = Get-ChildItem -Path "dist/Shoveler" -Recurse -File |
            ForEach-Object { $_.FullName.Replace("\", "/") }

          foreach ($suffix in $expectedSuffixes) {
            $matches = $packagedFiles | Where-Object { $_ -like "*/$suffix" }
            if (-not $matches) {
              $foundQss = $packagedFiles | Where-Object { $_ -like "*.qss" }
              Write-Host "QSS files found in package:"
              $foundQss | ForEach-Object { Write-Host "  $_" }
              throw "Missing packaged theme file ending with: $suffix"
            }
          }